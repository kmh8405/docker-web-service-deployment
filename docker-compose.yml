services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./api:/app
  
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    ports:
      - "33061:3306"
    volumes:
      - local_db:/var/lib/mysql
  
  worker:
    build: ./worker
    volumes:
      - ./worker:/app
    depends_on:
      - redis

  redis:
    image: redis:8

volumes:
  local_db: